<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Failure Resume | CV Kegagalan</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --accent: #ff4d4d; /* Merah untuk 'gagal' tapi berani */
            --accent-hover: #ff7373;
            --border: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Header */
        header {
            text-align: center;
            padding: 3rem 1rem;
            border-bottom: 1px solid var(--border);
            background: radial-gradient(circle at top, #1a1a1a, #0f0f0f);
        }

        h1 { font-size: 2.5rem; color: var(--accent); margin-bottom: 0.5rem; letter-spacing: -1px; }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }
        
        /* Navigation / Buttons */
        .actions-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 1.5rem;
            position: sticky;
            top: 0;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary { background-color: var(--accent); color: white; }
        .btn-primary:hover { background-color: var(--accent-hover); transform: translateY(-2px); }
        .btn-secondary { background-color: var(--card-bg); color: var(--text-main); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--text-muted); }

        /* Main Grid */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        /* Card Style */
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-color: var(--accent);
        }

        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-tag {
            font-size: 0.8rem;
            padding: 0.3rem 0.6rem;
            background: #333;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .cat-project { color: #ffa500; }
        .cat-rejection { color: #ff4d4d; }
        .cat-mistake { color: #4da6ff; }

        .card-body { padding: 1.5rem; }
        .card-title { font-size: 1.25rem; margin-bottom: 0.5rem; }
        .card-desc { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 1rem; }
        
        .media-preview {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 1rem;
            background: #000;
            display: block;
        }

        .lesson-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-left: 3px solid var(--accent);
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .card-footer {
            padding: 1rem 1.5rem;
            background: #151515;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Modal (Form & Detail) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
            position: relative;
            padding: 2rem;
        }

        .close-btn {
            position: absolute;
            top: 1rem; right: 1rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        
        input, select, textarea {
            width: 100%;
            padding: 0.8rem;
            background: #0f0f0f;
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 4px;
        }

        textarea { resize: vertical; min-height: 100px; }

        /* Discussion Section inside Modal */
        .discussion-section {
            margin-top: 2rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }
        .comment { background: #252525; padding: 1rem; margin-top: 0.5rem; border-radius: 4px; }
        .comment-author { font-weight: bold; font-size: 0.9rem; color: var(--accent); }
        .comment-text { margin-top: 0.5rem; font-size: 0.95rem; }
        
        .comment-form { display: flex; gap: 0.5rem; margin-top: 1rem; }

        /* Empty State */
        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 4rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <h1>The Failure Resume</h1>
        <p class="subtitle">Platform untuk merayakan kerentanan. Bagikan penolakan, proyek gagal, dan kesalahanmu agar kita semua bisa belajar.</p>
    </header>

    <div class="actions-bar">
        <button class="btn btn-primary" onclick="openUploadModal()">+ Bagikan Kegagalan</button>
        <button class="btn btn-secondary" onclick="exportData()">Export Data (JSON)</button>
    </div>

    <main class="container" id="postContainer">
        <!-- Posts will be rendered here -->
        <div class="empty-state">
            <h3>Belum ada cerita kegagalan.</h3>
            <p>Jadilah yang pertama membagikan "CV Kegagalan" mu!</p>
        </div>
    </main>

    <!-- Modal Upload -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('uploadModal')">&times;</button>
            <h2 style="margin-bottom: 1.5rem;">Tulis Cerita Kegagalanmu</h2>
            <form id="failureForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label>Judul Kegagalan</label>
                    <input type="text" id="title" placeholder="Contoh: Startup kenyangaku bangkrut di bulan ke-3" required>
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select id="category">
                        <option value="project">Proyek Gagal</option>
                        <option value="rejection">Penolakan Kerja</option>
                        <option value="mistake">Kesalahan Fatal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Deskripsi Singkat</label>
                    <textarea id="description" placeholder="Apa yang terjadi? Jujur saja..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Pelajaran yang Didapat (The Lesson)</label>
                    <textarea id="lesson" placeholder="Apa yang kamu pelajari dari ini?" required></textarea>
                </div>
                <div class="form-group">
                    <label>Lampiran (Bukti Portofolio/Gambar/Video)</label>
                    <input type="file" id="fileInput" accept="image/*,video/*,.pdf">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Publikasikan</button>
            </form>
        </div>
    </div>

    <!-- Modal Detail & Diskusi -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('detailModal')">&times;</button>
            <div id="detailContent">
                <!-- Dynamic Content -->
            </div>
            <div class="discussion-section">
                <h3>Diskusi Post-Mortem</h3>
                <div id="commentsContainer"></div>
                <div class="comment-form">
                    <input type="text" id="commentInput" placeholder="Tulis dukungan atau analisis...">
                    <button class="btn btn-primary" onclick="addComment()">Kirim</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Database Simulation using LocalStorage ---
        // Struktur Data: Array of Objects
        // { id, title, category, description, lesson, file (base64), fileType, date, comments: [] }

        const DB_KEY = 'failure_resume_db';
        let currentPostId = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderPosts();
        });

        const getData = () => {
            const data = localStorage.getItem(DB_KEY);
            return data ? JSON.parse(data) : [];
        };

        const saveData = (data) => {
            localStorage.setItem(DB_KEY, JSON.stringify(data));
        };

        // --- Render Logic ---
        const renderPosts = () => {
            const container = document.getElementById('postContainer');
            const posts = getData();

            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>Belum ada cerita kegagalan.</h3>
                        <p>Jadilah yang pertama membagikan "CV Kegagalan" mu!</p>
                    </div>`;
                return;
            }

            container.innerHTML = posts.map(post => `
                <div class="card" onclick="openDetailModal('${post.id}')">
                    ${post.file ? `
                        <div style="position:relative; height: 200px; background:#000;">
                            ${post.fileType && post.fileType.startsWith('video') ? 
                                `<video src="${post.file}" class="media-preview" style="height:100%; object-fit:cover;" muted></video>` : 
                                `<img src="${post.file}" class="media-preview" style="height:100%; object-fit:cover;" alt="Attachment">`
                            }
                        </div>
                    ` : ''}
                    <div class="card-header">
                        <h3 class="card-title">${escapeHtml(post.title)}</h3>
                        <span class="category-tag cat-${post.category}">${getCategoryLabel(post.category)}</span>
                    </div>
                    <div class="card-body">
                        <p class="card-desc">${escapeHtml(post.description)}</p>
                        <div class="lesson-box">
                            <strong>Pelajaran:</strong> ${escapeHtml(post.lesson)}
                        </div>
                    </div>
                    <div class="card-footer">
                        <span>${post.date}</span>
                        <span>${post.comments.length} Diskusi</span>
                    </div>
                </div>
            `).join('');
        };

        // --- Handlers ---
        const handleSubmit = (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;
            const lesson = document.getElementById('lesson').value;
            const fileInput = document.getElementById('fileInput');
            
            // File Reader Setup
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    savePost(title, category, description, lesson, e.target.result, file.type);
                };
                reader.readAsDataURL(file); // Convert to Base64
            } else {
                savePost(title, category, description, lesson, null, null);
            }
        };

        const savePost = (title, category, description, lesson, fileData, fileType) => {
            const posts = getData();
            const newPost = {
                id: Date.now().toString(),
                title,
                category,
                description,
                lesson,
                file: fileData,
                fileType: fileType,
                date: new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' }),
                comments: []
            };

            posts.unshift(newPost); // Add to top
            saveData(posts);
            renderPosts();
            closeModal('uploadModal');
            document.getElementById('failureForm').reset();
        };

        const openDetailModal = (id) => {
            currentPostId = id;
            const posts = getData();
            const post = posts.find(p => p.id === id);
            if (!post) return;

            const contentDiv = document.getElementById('detailContent');
            contentDiv.innerHTML = `
                <h2 style="margin-bottom: 0.5rem;">${escapeHtml(post.title)}</h2>
                <span class="category-tag cat-${post.category}" style="margin-bottom: 1rem; display:inline-block;">${getCategoryLabel(post.category)}</span>
                <p style="color: var(--text-muted); margin-bottom: 1rem;">${post.date}</p>
                
                ${post.file ? 
                    (post.fileType.startsWith('video') ? 
                        `<video controls src="${post.file}" style="width:100%; border-radius:4px; margin-bottom:1rem;"></video>` : 
                        `<img src="${post.file}" style="width:100%; border-radius:4px; margin-bottom:1rem;">`) 
                    : ''}
                
                <div style="white-space: pre-wrap;">${escapeHtml(post.description)}</div>
                
                <div class="lesson-box" style="margin-top: 1.5rem;">
                    <h4>Pelajaran Penting:</h4>
                    <p>${escapeHtml(post.lesson)}</p>
                </div>
            `;

            renderComments(post.comments);
            document.getElementById('detailModal').classList.add('active');
        };

        const renderComments = (comments) => {
            const container = document.getElementById('commentsContainer');
            if (comments.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted); font-size:0.9rem;">Belum ada diskusi. Jadilah yang pertama!</p>';
                return;
            }
            container.innerHTML = comments.map(c => `
                <div class="comment">
                    <div class="comment-author">Anonim</div>
                    <div class="comment-text">${escapeHtml(c.text)}</div>
                </div>
            `).join('');
        };

        const addComment = () => {
            const input = document.getElementById('commentInput');
            const text = input.value.trim();
            if (!text || !currentPostId) return;

            const posts = getData();
            const postIndex = posts.findIndex(p => p.id === currentPostId);
            if (postIndex === -1) return;

            posts[postIndex].comments.push({ text, date: new Date().toISOString() });
            saveData(posts);
            
            renderComments(posts[postIndex].comments);
            input.value = '';
            renderPosts(); // Refresh card to update count
        };

        // --- Utilities ---
        const openUploadModal = () => document.getElementById('uploadModal').classList.add('active');
        const closeModal = (id) => document.getElementById(id).classList.remove('active');

        const getCategoryLabel = (cat) => {
            const labels = {
                'project': 'Proyek Gagal',
                'rejection': 'Penolakan',
                'mistake': 'Kesalahan'
            };
            return labels[cat] || cat;
        };

        // Escape HTML to prevent XSS
        const escapeHtml = (text) => {
            if (!text) return text;
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Export Data as JSON
        function exportData() {
            const data = getData();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'failure_resume_backup.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Close modal if click outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        }
    </script>
</body>
</html>
